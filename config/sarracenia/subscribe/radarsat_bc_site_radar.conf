# Radar-Sat: BC site-radar GIF diagnostics (DPQPE and CAPPI).
# One queue has eight precise bindings, avoiding national-radar notification load.

broker amqps://anonymous@dd.weather.gc.ca/
topicPrefix v02.post
queueName q_${BROKER_USER}.${PROGRAM}.${CONFIG}.${HOSTNAME}

expire 12h
retry_ttl 12h
messageAgeMax 12h

instances 2
prefetch 1
inflight .
overwrite False
fileSizeMax 20M
logRotateCount 7
logRotateInterval 1d
runStateThreshold_idle 20m
runStateThreshold_lag 2m

# Aldergrove, Halfmoon Peak, Silver Star, and Prince George.
subtopic radar.DPQPE.GIF.CASAG.#
subtopic radar.DPQPE.GIF.CASHP.#
subtopic radar.DPQPE.GIF.CASSS.#
subtopic radar.DPQPE.GIF.CASPG.#
subtopic radar.CAPPI.GIF.CASAG.#
subtopic radar.CAPPI.GIF.CASHP.#
subtopic radar.CAPPI.GIF.CASSS.#
subtopic radar.CAPPI.GIF.CASPG.#

mirror False
directory ${HOME}/.local/share/radar-sat/spool/eccc/radar
acceptUnmatched False

# Retain the official DPQPE rain/snow image and ECCC contingency substitute.
accept .*/(CASAG|CASHP|CASSS|CASPG)/[0-9]{8}T[0-9]{4}Z_MSC_Radar-DPQPE_(CASAG|CASHP|CASSS|CASPG)_(Rain|Snow)(-Contingency)?\.gif$

# Keep the standard CAPPI rain/snow panels; skip duplicate _A11Y renderings.
accept .*/(CASAG|CASHP|CASSS|CASPG)/[0-9]{12}_(CASAG|CASHP|CASSS|CASPG)_CAPPI_1\.(5_RAIN|0_SNOW)\.gif$
