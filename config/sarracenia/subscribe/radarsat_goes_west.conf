# Radar-Sat: selected operational GOES-West GeoTIFF products.
# Installed by scripts/manage_eccc_feeds.sh; do not put passwords here.

broker amqps://anonymous@dd.weather.gc.ca/
topicPrefix v02.post
queueName q_${BROKER_USER}.${PROGRAM}.${CONFIG}.${HOSTNAME}

# Keep enough broker-side history to bridge a substantial workstation/network
# outage without approaching ECCC's 10,000-message anonymous queue guidance.
expire 12h
retry_ttl 12h
messageAgeMax 12h

instances 2
prefetch 1
inflight .
overwrite False
fileSizeMax 80M
logRotateCount 7
logRotateInterval 1d
runStateThreshold_idle 30m
runStateThreshold_lag 3m

# AMQP announcements use the dated source tree even though /today/ is the
# convenient HTTPS alias: v02.post.YYYYMMDD.WXO-DD.satellite.goes.west....
subtopic *.WXO-DD.satellite.goes.west.#

mirror False
directory ${HOME}/.local/share/radar-sat/spool/eccc/satellite
acceptUnmatched False

# These are the five satellite backgrounds used by the BC operational loops.
# NaturalColor is daylight-only; its overnight absence is expected.
accept .*/[0-2][0-9]/[0-9]{8}T[0-9]{4}Z_MSC_GOES-West_DayVis-NightIR_1km\.tif$
accept .*/[0-2][0-9]/[0-9]{8}T[0-9]{4}Z_MSC_GOES-West_NightIR_2km\.tif$
accept .*/[0-2][0-9]/[0-9]{8}T[0-9]{4}Z_MSC_GOES-West_VisibleIRSandwich-NightMicrophysicsIR_1km\.tif$
accept .*/[0-2][0-9]/[0-9]{8}T[0-9]{4}Z_MSC_GOES-West_SnowFog-NightMicrophysics_1km\.tif$
accept .*/[0-2][0-9]/[0-9]{8}T[0-9]{4}Z_MSC_GOES-West_NaturalColor_1km\.tif$
